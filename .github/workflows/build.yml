name: Build Android APK + AAB
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Unzip project
        run: |
          unzip -q *.zip -d android-project
          ls -R android-project

      - name: Find gradlew
        run: |
          GRADLEW=$(find android-project -name gradlew -type f | head -1)
          echo "GRADLEW=$GRADLEW" >> $GITHUB_ENV
          chmod +x $GRADLEW

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: cd $(dirname $GRADLEW) &&./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: '**/build/outputs/apk/debug/*.apk'
