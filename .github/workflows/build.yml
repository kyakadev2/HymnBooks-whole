name: Build Android APK + AAB
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show zip files + unzip
        run: |
          echo "=== ZIP FILES FOUND ==="
          ls -la *.zip
          echo "=== UNZIPPING ==="
          unzip -q whole_*.zip -d android-project
          echo "=== FOLDER STRUCTURE ==="
          ls -R android-project | head -100

      - name: Find or create gradlew
        run: |
          GRADLEW=$(find android-project -name gradlew -type f | head -1)
          if [ -z "$GRADLEW" ]; then
            echo "gradlew not found. Generating Gradle Wrapper..."
            cd android-project
            # Find project root with settings.gradle or build.gradle
            PROJECT_DIR=$(find. -name settings.gradle -o -name build.gradle | head -1 | xargs dirname)
            cd $PROJECT_DIR
            gradle wrapper
            GRADLEW=$(find. -name gradlew -type f | head -1)
          fi
          echo "GRADLEW=$GRADLEW"
          chmod +x $GRADLEW
          echo "GRADLEW=$GRADLEW" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(dirname $GRADLEW)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: cd $PROJECT_DIR &&./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: '**/build/outputs/apk/debug/*.apk'
